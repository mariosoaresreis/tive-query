version: "3.9"

services:
  tive-query:
    build: .
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ""
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tive
      DB_USER: tive
      DB_PASSWORD: tive
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TIVE_QUERY_API_KEY: local-dev-key
    depends_on:
      - postgres
      - redis
    networks:
      - tive-net

  # Shared with tive-webhook-receiver in local development.
  # Start tive-webhook-receiver first so Flyway can apply migrations.
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tive
      POSTGRES_USER: tive
      POSTGRES_PASSWORD: tive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tive-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - tive-net

volumes:
  pgdata:

networks:
  tive-net:

