# Service account for Workload Identity — binds the Kubernetes SA to a GCP SA
# that has Cloud SQL Client + Secret Manager Accessor roles.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tive-query-sa
  namespace: tive-query
  annotations:
    # Replace with your GCP project and service account name.
    iam.gke.io/gcp-service-account: tive-query@PROJECT_ID.iam.gserviceaccount.com

