apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tive-query-hpa
  namespace: tive-query
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tive-query
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30

